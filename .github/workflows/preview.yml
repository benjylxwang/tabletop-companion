name: Preview

on:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail-fast gates: type-check everything and run any lint stubs. Runs
      # before we wait on Railway so a bad PR is rejected immediately instead
      # of burning 3 min of polling.
      - name: Type-check
        run: pnpm -r build

      - name: Check database type drift
        run: |
          pnpm gen:types
          if ! git diff --quiet shared/src/database.types.ts; then
            echo "::error::shared/src/database.types.ts is stale — run 'pnpm gen:types' and commit the result"
            git diff shared/src/database.types.ts
            exit 1
          fi

      - name: Lint
        run: pnpm -r lint

      # Railway auto-deploys from its own GitHub integration — CI does NOT deploy.
      # We just wait for both services' deployments for this commit to go live.
      - name: Wait for Railway deployments
        id: railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          TIMEOUT_MS: "180000"
        run: node .github/scripts/wait-for-railway.mjs

      - name: Install Playwright browsers
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      # Service-role key is not stored as a repo secret — we pull it from the
      # Supabase Management API at CI time using the existing access token.
      # Keeps one less secret to rotate.
      - name: Fetch Supabase service-role key
        id: supabase_keys
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          resp=$(curl -sSf \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            "https://api.supabase.com/v1/projects/$SUPABASE_PROJECT_ID/api-keys")
          key=$(echo "$resp" | jq -r '.[] | select(.name == "service_role") | .api_key')
          if [ -z "$key" ] || [ "$key" = "null" ]; then
            echo "::error::Failed to resolve service_role key from Supabase Management API"
            exit 1
          fi
          echo "::add-mask::$key"
          echo "service_role_key=$key" >> "$GITHUB_OUTPUT"

      - name: Run Playwright tests
        id: pw
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.railway.outputs.frontend_url }}
          PLAYWRIGHT_API_URL: ${{ steps.railway.outputs.api_url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase_keys.outputs.service_role_key }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 14

      - name: Upload Playwright artifacts to R2
        if: always()
        id: r2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL_BASE: ${{ secrets.R2_PUBLIC_URL_BASE }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: node .github/scripts/upload-to-r2.mjs

      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            **Preview checks: ${{ steps.pw.outcome == 'success' && '✅ PASS' || '❌ FAIL' }}**

            - Frontend: ${{ steps.railway.outputs.frontend_url || '_not resolved_' }}
            - API: ${{ steps.railway.outputs.api_url || '_not resolved_' }}
            - [Playwright report](${{ steps.r2.outputs.report_url }}) (or [download artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts))
            - [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            <details><summary>Test videos</summary>

            ${{ steps.r2.outputs.videos_markdown }}

            </details>

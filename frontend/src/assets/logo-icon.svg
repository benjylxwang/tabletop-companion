<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Pointed shield shape -->
  <path d="M16 1.5 L28.5 6.5 L28.5 17 Q28.5 25 16 30.5 Q3.5 25 3.5 17 L3.5 6.5z"
        fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="0.9"/>

  <!-- Inner shield border (decorative double-line) -->
  <path d="M16 3.5 L26.5 7.8 L26.5 17 Q26.5 23.5 16 28.2 Q5.5 23.5 5.5 17 L5.5 7.8z"
        fill="none" stroke="#f59e0b" stroke-opacity="0.15" stroke-width="0.5"/>

  <!-- d20 icosahedron — top triangle face -->
  <polygon points="16,7 10.5,16.5 21.5,16.5" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="0.7" stroke-linejoin="round"/>

  <!-- d20 lower-left facet -->
  <polygon points="10.5,16.5 8,22.5 16,22.5" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- d20 lower-right facet -->
  <polygon points="21.5,16.5 24,22.5 16,22.5" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="0.5" stroke-linejoin="round"/>

  <!-- d20 upper-left facet -->
  <polygon points="16,7 8,12 10.5,16.5" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.4" stroke-linejoin="round" stroke-opacity="0.6"/>

  <!-- d20 upper-right facet -->
  <polygon points="16,7 24,12 21.5,16.5" fill="#f59e0b" fill-opacity="0.06" stroke="#f59e0b" stroke-width="0.4" stroke-linejoin="round" stroke-opacity="0.6"/>

  <!-- "20" on the main face -->
  <text x="16" y="15.5" text-anchor="middle" font-family="'Crimson Text', Georgia, serif" font-size="6.5" font-weight="700" fill="#f59e0b" letter-spacing="-0.3">20</text>
</svg>
